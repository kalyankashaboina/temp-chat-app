<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>

  <!-- Chat bubble body -->
  <path d="M5 8.5C5 7.12 6.12 6 7.5 6h17C25.88 6 27 7.12 27 8.5v12C27 21.88 25.88 23 24.5 23H18l-4 3v-3H7.5C6.12 23 5 21.88 5 20.5V8.5z" fill="white" fill-opacity="0.15"/>
  <path d="M5 8.5C5 7.12 6.12 6 7.5 6h17C25.88 6 27 7.12 27 8.5v12C27 21.88 25.88 23 24.5 23H18l-4 3v-3H7.5C6.12 23 5 21.88 5 20.5V8.5z" stroke="white" stroke-opacity="0.4" stroke-width="0.75" fill="none"/>

  <!-- Lightning bolt - the "Relay" signal inside chat -->
  <path d="M17.5 9.5L13 17h4.5L14.5 22.5L20 15h-4.5L17.5 9.5z" fill="url(#bolt)" stroke="#fef3c7" stroke-width="0.4" stroke-linejoin="round"/>
</svg>
