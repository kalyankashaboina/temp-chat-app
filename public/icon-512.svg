<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="35%" stop-color="#4f46e5"/>
      <stop offset="70%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine512" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bubble512" x1="80" y1="100" x2="432" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bolt512" x1="220" y1="130" x2="295" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="boltStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="boltGlow512" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleDepth" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1e1b4b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Full background (maskable) -->
  <rect width="512" height="512" fill="url(#bg512)"/>
  <rect width="512" height="512" fill="url(#shine512)"/>

  <!-- Radial glow center -->
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="url(#glowCenter)"/>

  <!-- Decorative background rings -->
  <circle cx="256" cy="256" r="195" stroke="white" stroke-opacity="0.05" stroke-width="1" fill="none"/>
  <circle cx="256" cy="256" r="230" stroke="white" stroke-opacity="0.04" stroke-width="0.75" fill="none"/>

  <!-- Background accent circles -->
  <circle cx="410" cy="100" r="140" fill="white" fill-opacity="0.03"/>
  <circle cx="90" cy="420" r="120" fill="white" fill-opacity="0.03"/>

  <!-- Main chat bubble -->
  <g filter="url(#bubbleDepth)">
    <path d="M90 138C90 118.12 106.12 102 126 102h260C405.88 102 422 118.12 422 138v194c0 19.88-16.12 36-36 36H296l-40 42-40-42H126C106.12 368 90 351.88 90 332V138z"
      fill="url(#bubble512)" stroke="white" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- Inner highlight line on bubble top -->
  <path d="M110 140C110 129.5 118.5 121 129 121h254" stroke="white" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Lightning bolt (Relay signal) -->
  <g filter="url(#boltGlow512)">
    <path d="M282 132L232 252h52L244 380 312 258H258L282 132z"
      fill="url(#bolt512)"/>
    <path d="M282 132L232 252h52L244 380 312 258H258L282 132z"
      fill="none" stroke="url(#boltStroke)" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Live indicator dots (bottom right of bubble) -->
  <circle cx="340" cy="388" r="9" fill="white" fill-opacity="0.45"/>
  <circle cx="365" cy="388" r="9" fill="white" fill-opacity="0.3"/>
  <circle cx="390" cy="388" r="9" fill="white" fill-opacity="0.15"/>

  <!-- App name text: "RELAY" small, elegant, below icon area (within maskable safe zone) -->
  <text x="256" y="454" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="10" text-anchor="middle" fill="white" fill-opacity="0.6">RELAY</text>
</svg>
